<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Bötesapp</title>
  <link rel="stylesheet" href="stil.css" />
</head>
<body>
  <main class="app">
    <section class="full app-nav">
      <div class="mobile-nav-header">
        <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-menu">☰ Meny</button>
      </div>
      <button id="menu-backdrop" class="menu-backdrop" type="button" aria-label="Stäng meny"></button>
      <nav id="mobile-menu" class="mobile-menu" aria-label="Mobilmeny">
        <button class="menu-item" data-tab-target="fine" type="button">Lägg till böter</button>
        <button class="menu-item" data-tab-target="person" type="button">Lägg till spelare</button>
        <button class="menu-item" data-tab-target="summary" type="button">Sammanställning</button>
      </nav>
    </section>

    <section class="card tab-panel" data-tab-panel="person">
      <div class="section-title">
        <h2>Lägg till person</h2>
      </div>
      <form id="person-form" class="input-row">
        <input id="person-name" type="text" placeholder="Namn på person" required />
        <button type="submit" class="btn-primary">Lägg till</button>
      </form>
      <div style="margin-top:0.9rem;">
        <h3>Personer</h3>
        <ul id="person-list" class="person-list"></ul>
      </div>
    </section>

    <section class="card tab-panel" data-tab-panel="fine">
      <div class="section-title">
        <h2>Lägg till böter</h2>
      </div>
      <form id="fine-form" class="input-row">
        <select id="fine-person" required>
          <option value="">Välj person</option>
        </select>
        <input id="fine-description" type="text" placeholder="Beskrivning (ex. Glömde disken)" required />
        <input id="fine-amount" type="number" min="1" step="1" placeholder="Belopp (kr)" required />
        <input id="fine-date" type="date" required />
        <button type="submit" class="btn-primary">Lägg till böter</button>
      </form>
      <div style="margin-top:0.9rem;">
        <h3>Böter</h3>
        <ul id="fine-list" class="fine-list"></ul>
      </div>
    </section>

    <section class="card full tab-panel" data-tab-panel="summary">
      <div class="section-title">
        <h2>Sammanställning</h2>
      </div>
      <div class="stats-grid">
        <div class="stat">
          <div class="muted">Totalt belopp (alla böter)</div>
          <div id="total-all" class="stat-value">0 kr</div>
        </div>
        <div class="stat">
          <div class="muted">Totalt obetalt</div>
          <div id="total-unpaid" class="stat-value">0 kr</div>
        </div>
      </div>
      <div style="margin-top:1rem;">
        <h3>Per person</h3>
        <ul id="summary-person" class="summary-list"></ul>
      </div>
      <div style="margin-top:1rem;">
        <h3>Per månad</h3>
        <ul id="summary-month" class="summary-list"></ul>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
